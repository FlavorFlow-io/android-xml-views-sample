# White-Label Build: fetch every client from FlavorFlow, then build + screenshot
# one APK per client in a matrix. Mirrors the Jetpack Compose sample but applies
# XML theming (project-type: android-native-xml) and validates with Roborazzi.
#
# Requires repo secret TEST_API_KEY and repo variable TEST_PROJECT_ID.
name: White-Label Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fetch-flavors:
    runs-on: ubuntu-latest
    outputs:
      flavors: ${{ steps.fetch-flavors-action.outputs.flavors }}
    steps:
      - uses: actions/checkout@v5

      - name: Fetch flavors
        id: fetch-flavors-action
        uses: FlavorFlow-io/fetch-flavors-action@v1
        with:
          api-key: ${{ secrets.TEST_API_KEY }}
          project-id: ${{ vars.TEST_PROJECT_ID }}

  build-flavors:
    name: Build '${{ matrix.name }}'
    needs: fetch-flavors
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(needs.fetch-flavors.outputs.flavors) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - name: Apply branding
        uses: FlavorFlow-io/apply-flavor-action@v1
        with:
          project-api-key: ${{ secrets.TEST_API_KEY }}
          flavor: ${{ matrix.config }}
          project-type: 'android-native-xml'

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      # apply-flavor-action rewrote colors.xml / themes.xml / strings.xml above.
      # If this flavor already has a committed golden, validate against it;
      # otherwise record one and upload it (bootstrap — see goldens/README.md).
      - name: Validate theme screenshot for this flavor
        run: |
          GOLDEN="app/screenshots/goldens/${{ matrix.app_name }}.png"
          if [ -f "$GOLDEN" ]; then
            ./scripts/select-screenshot-golden.sh "${{ matrix.app_name }}"
            ./gradlew verifyRoborazziDebug --stacktrace
          else
            echo "::notice::No committed golden for '${{ matrix.app_name }}' yet — recording one."
            ./gradlew recordRoborazziDebug --stacktrace
          fi

      - name: Upload screenshot (recorded image / diff report)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: screenshot-${{ matrix.name }}
          path: |
            app/src/test/snapshots/
            app/build/outputs/roborazzi/

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-${{ matrix.name }}.apk
          path: '**/outputs/**/*.apk'
