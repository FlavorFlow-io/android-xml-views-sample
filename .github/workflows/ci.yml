# Secret-independent CI: proves the Gradle project compiles and the Roborazzi
# screenshot test renders the BASE (default) theme — no FlavorFlow API needed.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Record base screenshot
        run: ./gradlew recordRoborazziDebug --stacktrace

      - name: Upload base screenshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: base-screenshot
          path: |
            app/src/test/snapshots/
            app/build/outputs/roborazzi/
